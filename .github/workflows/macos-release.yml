name: macOS Release
on:
  push:
    tags:
      - 'macos/v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true

      - run: flutter pub get
        working-directory: apps/mobile

      - run: dart analyze .
        working-directory: apps/mobile

      - run: flutter test
        working-directory: apps/mobile

      - name: Install Codemagic CLI Tools
        run: |
          pipx install codemagic-cli-tools
          pipx ensurepath

      - name: Fetch Developer ID signing files
        run: |
          set -o pipefail
          P12_PATH="$RUNNER_TEMP/certificate.p12"
          CERT_KEY_PATH="$RUNNER_TEMP/certificate-key.pem"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$P12_PATH"
          openssl pkcs12 \
            -in "$P12_PATH" \
            -nocerts \
            -nodes \
            -passin "pass:$MACOS_CERTIFICATE_PASSWORD" \
            | openssl rsa -out "$CERT_KEY_PATH"

          if ! app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type MAC_APP_DIRECT \
            --platform MAC_OS \
            --create \
            --certificate-key "@file:$CERT_KEY_PATH"; then
            echo "::error::Failed to fetch Developer ID signing files. Check that MACOS_CERTIFICATE_P12 matches an existing Developer ID Application certificate in App Store Connect, or rotate the secret before re-running."
            exit 1
          fi
        env:
          BUNDLE_ID: com.k9i.ccpocket

      - name: Setup keychain
        run: keychain initialize

      - name: Add certs to keychain
        run: keychain add-certificates

      # --- Build ---
      - name: Set up code signing
        run: xcode-project use-profiles

      - name: Build macOS app
        working-directory: apps/mobile
        run: flutter build macos --release

      - name: Verify signed app bundle
        id: app
        run: |
          APP_PATH="apps/mobile/build/macos/Build/Products/Release/CC Pocket.app"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

          codesign --verify --deep --strict "$APP_PATH"

          PROFILE_PATH="$APP_PATH/Contents/embedded.provisionprofile"
          if [ ! -f "$PROFILE_PATH" ]; then
            echo "::error::missing embedded.provisionprofile in signed macOS app bundle"
            exit 1
          fi

          echo "✅ Code signing verified"
          echo "✅ embedded.provisionprofile present"

      # --- Create DMG ---
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        id: dmg
        run: |
          APP_PATH="${{ steps.app.outputs.app_path }}"
          DMG_NAME="CC-Pocket-macos.dmg"

          # Create DMG with Applications symlink and styled window
          create-dmg \
            --volname "CC Pocket" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CC Pocket.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH"

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"

          # Sign the DMG too
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -n "$IDENTITY" ]; then
            codesign --force --sign "$IDENTITY" "$DMG_NAME"
          fi

      # --- Notarize ---
      - name: Setup App Store Connect API key for notarization
        run: |
          KEY_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$(dirname "$KEY_PATH")"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_PATH"

      - name: Notarize DMG
        run: |
          KEY_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait --timeout 30m

          # Staple the notarization ticket
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"
          echo "✅ Notarization complete"

      # --- GitHub Release ---
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "version=${GITHUB_REF_NAME#macos/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION%%+*}"
          NOTES=$(awk "/^## \\[${SEMVER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Rename DMG with version
        if: startsWith(github.ref, 'refs/tags/')
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION%%+*}"
          VERSIONED_DMG="CC-Pocket-macos-v${SEMVER}.dmg"
          mv "${{ steps.dmg.outputs.dmg_path }}" "$VERSIONED_DMG"
          echo "dmg_path=$VERSIONED_DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > /tmp/release_notes.md
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.rename.outputs.dmg_path }}" \
            --title "macOS ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
