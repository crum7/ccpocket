name: Daily Metrics

on:
  schedule:
    # JST 9:00 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post daily metrics to Discord
        run: bash scripts/daily-metrics.sh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
