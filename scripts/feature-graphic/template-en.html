<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: #000;
    position: relative;
  }

  /* Subtle accent glow */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 50%, rgba(232, 120, 50, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 50%, rgba(80, 220, 180, 0.04) 0%, transparent 40%);
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
  }

  /* Left side: Logo + Text */
  .left {
    flex: 0 0 420px;
    padding-left: 60px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .logo-img {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    overflow: hidden;
  }

  .logo-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .app-name {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .tagline {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 4px;
    line-height: 1.3;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .badge-claude {
    background: linear-gradient(135deg, rgba(232, 120, 50, 0.25), rgba(232, 120, 50, 0.1));
    color: #e87832;
    border: 1px solid rgba(232, 120, 50, 0.3);
  }

  .badge-codex {
    background: linear-gradient(135deg, rgba(80, 220, 180, 0.2), rgba(80, 220, 180, 0.08));
    color: #50dcb4;
    border: 1px solid rgba(80, 220, 180, 0.3);
  }

  /* Right side: Screenshots */
  .right {
    flex: 1;
    position: relative;
    height: 100%;
    overflow: hidden;
  }

  .phone-frame {
    position: absolute;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .phone-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  .phone-1 {
    width: 270px;
    height: 540px;
    top: 20px;
    left: 30px;
    transform: perspective(800px) rotateY(-5deg);
    z-index: 2;
  }

  .phone-2 {
    width: 250px;
    height: 510px;
    top: 30px;
    left: 265px;
    transform: perspective(800px) rotateY(-8deg);
    z-index: 1;
    opacity: 0.8;
  }

  /* Glow accent at bottom */
  .bottom-glow {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 60px;
    background: linear-gradient(90deg, rgba(232, 120, 50, 0.15), rgba(80, 220, 180, 0.1));
    filter: blur(30px);
    z-index: 0;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="logo-row">
        <div class="logo-img">
          <img src="ICON_PATH" alt="CC Pocket">
        </div>
        <div class="app-name">CC Pocket</div>
      </div>
      <div class="tagline">Coding AI Remote<br>for your pocket</div>
      <div class="badge-row">
        <span class="badge badge-claude">Claude Code</span>
        <span class="badge badge-codex">Codex</span>
      </div>
    </div>
    <div class="right">
      <div class="phone-frame phone-1">
        <img src="SCREENSHOT_1_PATH" alt="Session List">
      </div>
      <div class="phone-frame phone-2">
        <img src="SCREENSHOT_2_PATH" alt="Approval">
      </div>
    </div>
  </div>
  <div class="bottom-glow"></div>
</body>
</html>
