<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #FFFFFF 0%, #F4F4F5 100%);
    position: relative;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    /* Safe zone: 102px left/right, 75px top, 100px bottom */
    padding: 75px 102px 100px 102px;
  }

  .left {
    flex: 0 0 380px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .logo-img {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
  }

  .logo-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .app-name {
    font-size: 42px;
    font-weight: 800;
    color: #111;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .tagline {
    font-size: 28px;
    font-weight: 700;
    color: #111;
    margin-top: 4px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 15px;
    font-weight: 400;
    color: rgba(17, 17, 17, 0.55);
    margin-top: 8px;
    line-height: 1.4;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .badge-claude {
    background: rgba(232, 120, 50, 0.12);
    color: #c45a1a;
    border: 1px solid rgba(232, 120, 50, 0.3);
  }

  .badge-codex {
    background: rgba(40, 160, 120, 0.1);
    color: #1a8a5c;
    border: 1px solid rgba(40, 160, 120, 0.3);
  }

  /* Right side: Screenshots — intentionally overflow for dynamic look */
  .right {
    flex: 1;
    position: relative;
    height: 100%;
    overflow: visible;
  }

  .phone-frame {
    position: absolute;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
    border: 1px solid rgba(0, 0, 0, 0.08);
  }

  .phone-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  .phone-1 {
    width: 270px;
    height: 540px;
    top: -30px;
    left: 10px;
    transform: perspective(800px) rotateY(-5deg);
    z-index: 2;
  }

  .phone-2 {
    width: 250px;
    height: 510px;
    top: -20px;
    left: 240px;
    transform: perspective(800px) rotateY(-8deg);
    z-index: 1;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="logo-row">
        <div class="logo-img">
          <img src="ICON_PATH" alt="CC Pocket">
        </div>
        <div class="app-name">CC Pocket</div>
      </div>
      <div class="tagline">随时随地编程</div>
      <div class="subtitle">Mac 上的编程 AI，<br>装进口袋。</div>
      <div class="badge-row">
        <span class="badge badge-codex">Codex</span>
        <span class="badge badge-claude">Claude Code</span>
      </div>
    </div>
    <div class="right">
      <div class="phone-frame phone-1">
        <img src="SCREENSHOT_1_PATH" alt="会话列表">
      </div>
      <div class="phone-frame phone-2">
        <img src="SCREENSHOT_2_PATH" alt="审批界面">
      </div>
    </div>
  </div>
</body>
</html>
